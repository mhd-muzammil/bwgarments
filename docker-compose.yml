services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:changeme@mongo:27017/bw-garments?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-changeme_generate_a_real_secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-changeme_generate_a_real_secret}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5000
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo-data:
